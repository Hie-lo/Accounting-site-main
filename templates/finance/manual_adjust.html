{% extends 'base.html' %}
{% block title %}تغییر دستی موجودی{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">تغییر دستی موجودی کیف پول</div>
            <div class="card-body">
                <p>موجودی فعلی: <strong>{{ wallet.balance }} تومان</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>موجودی جدید (تومان)</label>
                        <input type="number" name="new_balance" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>دلیل تغییر</label>
                        <textarea name="reason" class="form-control" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning">اعمال تغییر</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">بازگشت</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
